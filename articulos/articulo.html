<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title id="pageTitle">Artículo - Sol Argentino TV</title>
        <link rel="stylesheet" id="articleCssLink" href="../assets/css/article.css">
        <link rel="stylesheet" href="../assets/css/satv.css">
        <link rel="stylesheet" href="../assets/css/footer.css">
        <link rel="stylesheet" href="../assets/css/vidstack/1.css">
        <link rel="stylesheet" href="../assets/css/vidstack/2.css">
        <script src="https://cdn.vidstack.io/player" type="module"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="../assets/js/sb.js"></script>
        <link rel="icon" href="https://solargentinotv.com.ar/assets/media/images/Logo%20SATV%202026.png" type="image/png">
    </head>

    <body>

        <div id="page-scroll">

            <header class="header">
                <div class="menu-container">
                    <h1 class="logo">Sol Argentino TV</h1>
                    <nav class="navbar">
                        <ul class="nav-menu">
                            <li><a href="/">Inicio</a></li>
                            <li><a href="/noticias">Noticias</a></li>
                            <li><a href="/contacto">Contacto</a></li>
                        </ul>
                    </nav>
                </div>
            </header>

            <main>
                <section id="articulo">

                    <h1 id="h1article"></h1>
                    <img id="imgArticle">
                    <div id="contenidoArticle"></div>

                </section>
            </main>

            <footer>
                <p>&copy; 2026 Sol Argentino TV - Todos los derechos reservados.
                    <a href="/contacto">Contactanos</a>
                </p>
            </footer>

        </div>


        <!-- 🔥 SCRIPT FINAL ARREGLADO -->
        <script>
            const articleId = new URLSearchParams(location.search).get("id");

            // CSS dinámico por ID
            (function cargarCssDinamico() {
                const cssLink = document.getElementById("articleCssLink");
                if (!cssLink) return;

                if (articleId) {
                    cssLink.href = `/assets/css/${articleId}.css`;
                } else {
                    cssLink.href = "/assets/css/article.css";
                }
            })();

            async function cargarArticulo() {
                const id = articleId;
                if (!id) {
                    console.error("No se recibió el parámetro id");
                    return;
                }

                /* =============================
                   ARTÍCULO
                ============================= */
                const { data: art, error: artErr } = await sb
                    .from("articulos")
                    .select("*")
                    .eq("id", id)
                    .single();

                if (artErr || !art) {
                    console.error("Artículo no encontrado", artErr);
                    return;
                }

                document.title = `${art.titulo} - Sol Argentino TV`;

                if (typeof h1article !== "undefined" && h1article) {
                    h1article.textContent = art.titulo || "Artículo";
                }

                if (typeof imgArticle !== "undefined" && imgArticle) {
                    if (art.imagen) {
                        imgArticle.src = art.imagen;
                        imgArticle.alt = art.titulo || "Imagen del artículo";
                        imgArticle.style.display = "";
                    } else {
                        imgArticle.removeAttribute("src");
                        imgArticle.alt = "";
                        imgArticle.style.display = "none";
                    }
                }

                /* =============================
                   VIDEOS
                ============================= */
                const { data: videos = [], error: videosErr } = await sb
                    .from("articulos_videos")
                    .select("*")
                    .eq("articulo_id", id)
                    .order("orden");

                if (videosErr) {
                    console.error("Error cargando videos", videosErr);
                }

                let html = art.contenido || "";

                // Auto <p> si viene texto plano
                if (!html.includes("<p")) {
                    html = html
                        .split(/\n\s*\n/)
                        .map(t => t.trim())
                        .filter(Boolean)
                        .map(t => `<p>${t}</p>`)
                        .join("");
                }

                /* =============================
                   PLAYER + THUMBNAILS AUTO
                ============================= */
                videos.forEach(v => {
                    if (!v?.url) return;

                    const videoUrl = v.url;
                    const vttUrl = videoUrl.replace(/\.[^/.]+$/, ".vtt");

                    const player = `
                <div class="video-wrapper">
                    <media-player
                        src="${videoUrl}"
                        playsinline
                        preload="metadata"
                        crossorigin
                    >
                        <media-provider></media-provider>
                        <media-video-layout thumbnails="${vttUrl}"></media-video-layout>
                    </media-player>
                </div>
                `;

                    const regex = new RegExp(`\\{video-${v.orden}\\}`, "g");

                    if (regex.test(html)) {
                        html = html.replace(regex, player);
                    } else {
                        html += player;
                    }
                });

                if (typeof contenidoArticle !== "undefined" && contenidoArticle) {
                    contenidoArticle.innerHTML = html;
                }
            }

            cargarArticulo();
        </script>

    </body>

</html>
